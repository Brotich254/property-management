spring.application.name=property-management

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/property_management
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
app.jwt.secret=your-super-secret-jwt-key-change-this-in-production-with-at-least-256-bits
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowedOrigins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.root=INFO
logging.level.com.property=DEBUG
